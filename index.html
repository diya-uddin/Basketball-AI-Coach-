<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Basketball AI Coach</title>
    
    <!-- ตั้งค่า PWA สำหรับ iPad/iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Coach">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/805/805404.png">
    <link rel="manifest" href="manifest.json">

    <!-- โหลดเครื่องมือตกแต่งหน้าเว็บและฟอนต์ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div class="bg-orange-500 text-white text-center p-4 text-xl font-bold shadow-md pt-12">
        🏀 AI Basketball Coach
    </div>
    
    <div class="p-4 max-w-md mx-auto mt-4">
        <div class="bg-white rounded-xl shadow-md p-5 mb-4 border-t-4 border-orange-400">
            <h2 class="font-bold text-lg mb-3 text-gray-700 flex items-center">
                👩🏻‍練 ข้อความจากโค้ช
            </h2>
            <div id="coach-message" class="text-gray-600 bg-gray-50 p-4 rounded-lg italic text-sm">
                กดปุ่มด้านล่างเพื่อปลุกโค้ชได้เลยค่ะ! Zzz...
            </div>
            <button onclick="greetCoach()" id="btn-greet" class="mt-4 bg-orange-500 text-white px-4 py-2 rounded-lg w-full hover:bg-orange-600 transition font-bold shadow-sm">
                👋 ทักทายโค้ช
            </button>
        </div>
    </div>

    <script>
        // ⚠️ เอา URL ของ Web App (Google Apps Script) มาวางแทนที่ข้อความด้านล่างนี้
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbziMY3WVIf5YRDyMIW9uxhelJds5ozS8eslKQntRY5BP99J1fCaLDhhZL-nEwcLyw_HqA/exec';

        async function greetCoach() {
            const msgElement = document.getElementById('coach-message');
            const btnElement = document.getElementById('btn-greet');
            
            msgElement.innerHTML = 'โค้ชกำลังวิเคราะห์ข้อมูล... ⏳';
            btnElement.disabled = true;
            btnElement.classList.add('opacity-50');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getGreeting' })
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    msgElement.innerHTML = result.message;
                } else {
                    msgElement.innerHTML = '❌ ' + result.message;
                }
            } catch (error) {
                msgElement.innerHTML = '❌ เชื่อมต่อไม่ได้ โปรดตรวจสอบอินเทอร์เน็ต';
            } finally {
                btnElement.disabled = false;
                btnElement.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
