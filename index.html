<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Hoop Coach</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#ea580c">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #111827; color: white; overflow: hidden; height: 100vh; height: -webkit-fill-available; display: flex; flex-direction: column; }
        main { flex: 1; position: relative; overflow: hidden; }
        .tab-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; overflow-y: auto; padding: 1rem; }
        #page-dashboard.active, #page-quests.active { display: block; }
        #page-chat.active { display: flex; flex-direction: column; padding: 0; } 
        nav { height: 70px; background-color: #1f2937; border-top: 1px solid #374151; padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
        .glow-text { text-shadow: 0 0 10px rgba(255, 115, 0, 0.8); }
        .bg-wave { background: linear-gradient(120deg, #ea580c, #ff7b00, #c2410c); background-size: 300% 300%; animation: waveAnimation 5s ease-in-out infinite; }
        @keyframes waveAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .quest-card { border-left: 4px solid #ea580c; }
    </style>
</head>
<body>

    <header class="bg-wave text-white p-4 text-center font-extrabold text-xl shadow-lg relative z-10 pt-safe">
        🏀 AI HOOP COACH
    </header>

    <main>
        <div id="page-dashboard" class="tab-content active">
            <div class="bg-gray-800 rounded-2xl p-6 text-center shadow-lg mb-6 border border-gray-700 relative overflow-hidden">
                <h2 class="text-gray-400 text-sm font-semibold tracking-wider">OVERALL RATING</h2>
                <div id="ovr-display" class="text-6xl font-extrabold text-orange-500 glow-text my-2">--</div>
                <p class="text-xs text-gray-400">ดึงข้อมูลล่าสุดจากระบบ</p>
            </div>

            <div class="bg-gray-800 rounded-2xl p-4 shadow-lg border border-gray-700 mb-6">
                <h3 class="text-center font-bold text-gray-400 mb-2">📊 STATS ANALYSIS</h3>
                <div class="relative w-full h-64">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>
            
            <button onclick="openModal()" class="w-full bg-wave text-white font-bold py-3 rounded-xl shadow-md transform transition active:scale-95">
                ⚖️ อัปเดตข้อมูลร่างกายประจำเดือน
            </button>
        </div>

        <div id="page-quests" class="tab-content">
            <h2 class="text-xl font-bold text-orange-400 mb-4 flex items-center gap-2">
                📋 <span>ตารางฝึกซ้อมประจำสัปดาห์</span>
            </h2>
            <div id="quests-container" class="space-y-4">
                <div class="text-center p-8 text-gray-500">กำลังโหลดตารางฝึก... ⏳</div>
            </div>
        </div>

        <div id="page-chat" class="tab-content">
            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-box">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-wave flex items-center justify-center text-white font-bold shadow-md text-xs border-2 border-white">AI</div>
                    <div class="bg-gray-700 text-white p-3 rounded-2xl rounded-tl-none max-w-[80%] text-sm shadow-md">
                        สวัสดีค่ะ! โค้ชพร้อมแล้ว วันนี้พร้อมลุยหรือยังคะ? พิมพ์คุยกับโค้ชได้เลยนะ 🏀✨
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-3 border-t border-gray-700 pb-safe">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="พิมพ์คุยกับโค้ช..." autocomplete="off" required
                           class="flex-1 bg-gray-900 text-white border border-gray-600 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-orange-500">
                    <button type="submit" class="bg-wave text-white w-10 h-10 rounded-full flex justify-center items-center shadow-md transform transition active:scale-90">
                        ➤
                    </button>
                </form>
            </div>
        </div>
        
        <div id="stats-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex justify-center items-center p-4">
            <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-sm border border-gray-700 shadow-xl">
                <h3 class="text-xl font-bold text-orange-500 mb-4 flex items-center gap-2">⚖️ อัปเดตข้อมูลร่างกาย</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-gray-400 text-sm">ส่วนสูง (ซม.)</label>
                        <input type="number" id="input-height" class="w-full bg-gray-900 text-white p-3 mt-1 rounded-lg border border-gray-700 focus:border-orange-500 outline-none" placeholder="เช่น 175">
                    </div>
                    <div>
                        <label class="text-gray-400 text-sm">น้ำหนัก (กก.)</label>
                        <input type="number" id="input-weight" class="w-full bg-gray-900 text-white p-3 mt-1 rounded-lg border border-gray-700 focus:border-orange-500 outline-none" placeholder="เช่น 70">
                    </div>
                </div>
                <div class="mt-6 flex gap-3">
                    <button onclick="closeModal()" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white py-3 rounded-lg font-bold transition">ยกเลิก</button>
                    <button onclick="saveStats()" class="flex-1 bg-orange-500 hover:bg-orange-400 text-white py-3 rounded-lg font-bold transition" id="btn-save-stats">บันทึก</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="flex justify-around items-center pt-2">
        <button onclick="changePage('dashboard')" class="nav-btn text-orange-500 flex flex-col items-center w-1/3" id="nav-dashboard">
            <span class="text-2xl">📊</span><span class="text-[10px] font-bold mt-1">สเตตัส</span>
        </button>
        <button onclick="changePage('quests')" class="nav-btn text-gray-500 flex flex-col items-center w-1/3" id="nav-quests">
            <span class="text-2xl">📋</span><span class="text-[10px] font-bold mt-1">ตารางฝึก</span>
        </button>
        <button onclick="changePage('chat')" class="nav-btn text-gray-500 flex flex-col items-center w-1/3" id="nav-chat">
            <span class="text-2xl">💬</span><span class="text-[10px] font-bold mt-1">คุยกับโค้ช</span>
        </button>
    </nav>

    <script>
        // ⚠️ ลิ้งก์ API ด้านล่างนี้คือของเดิมของคุณ ผมใส่ค้างไว้ให้เลย ⚠️
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx-aYedhDMUw-bIxVkMC0FcdgIGtx1GW1uAED-Ryhil-g13aXVVcXO0Q58_5zOwG2jD/exec';

        // 1. ระบบเปลี่ยนหน้า Tab
        function changePage(pageId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => { el.classList.remove('text-orange-500'); el.classList.add('text-gray-500'); });
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.remove('text-gray-500');
            document.getElementById('nav-' + pageId).classList.add('text-orange-500');
        }

        // 2. ตั้งค่ากราฟ Radar
        let statsChart = new Chart(document.getElementById('statsChart').getContext('2d'), {
            type: 'radar',
            data: {
                labels: ['JMP', 'STA', 'STR', 'AGI', 'SHT', 'FIN', 'DRB'],
                datasets: [{
                    label: 'Stats',
                    data: [0, 0, 0, 0, 0, 0, 0], 
                    backgroundColor: 'rgba(255, 115, 0, 0.2)',
                    borderColor: '#ff7b00',
                    pointBackgroundColor: '#fff',
                    borderWidth: 2
                }]
            },
            options: {
                scales: { r: { min: 0, max: 99, ticks: { display: false }, grid: { color: 'rgba(255, 255, 255, 0.1)' }, pointLabels: { color: '#9ca3af' } } },
                plugins: { legend: { display: false } }, maintainAspectRatio: false
            }
        });

        // 3. ฟังก์ชันดึงข้อมูล Dashboard
        async function loadDashboard() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboard' }) });
                const result = await response.json();
                
                if (result.status === 'success') {
                    const data = result.data;
                    document.getElementById('ovr-display').innerText = data.OVR || 0;
                    statsChart.data.datasets[0].data = [data.JMP, data.STA, data.STR, data.AGI, data.SHT, data.FIN, data.DRB];
                    statsChart.update();
                }
            } catch (error) { console.error("โหลดข้อมูล Dashboard ไม่สำเร็จ"); }
        }

        // 4. ฟังก์ชันดึงตารางฝึก
        async function loadQuests() {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getQuests' }) });
                const result = await response.json();
                const container = document.getElementById('quests-container');
                container.innerHTML = ''; 

                if (result.status === 'success' && result.data.length > 0) {
                    result.data.forEach(quest => {
                        container.innerHTML += `
                            <div class="bg-gray-800 p-4 rounded-xl quest-card flex justify-between items-center transition transform active:scale-95">
                                <div>
                                    <span class="text-[10px] text-orange-400 font-bold tracking-wider uppercase">${quest.category}</span>
                                    <h4 class="font-bold text-white text-md">${quest.name}</h4>
                                    <p class="text-xs text-gray-400 mt-1">${quest.detail}</p>
                                </div>
                                <button class="bg-gray-700 hover:bg-orange-500 text-white p-2 px-3 rounded-lg text-xs font-bold transition whitespace-nowrap ml-2">บันทึก</button>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `
                        <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 text-center">
                            <span class="text-4xl mb-3 opacity-50 block">📝</span>
                            <h4 class="font-bold text-gray-300">ตารางว่างเปล่า</h4>
                            <p class="text-sm text-gray-500 mt-2">ยังไม่มีการฝึกซ้อมที่รออยู่ครับ</p>
                        </div>
                    `;
                }
            } catch (error) { document.getElementById('quests-container').innerHTML = '<div class="text-center text-red-500 p-4">❌ โหลดข้อมูลไม่สำเร็จ</div>'; }
        }

        // 5. ระบบแชท AI
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = "flex items-start gap-3 " + (sender === 'Me' ? "flex-row-reverse" : "");
            let avatar = sender === 'Me' 
                ? `<div class="w-8 h-8 rounded-full bg-gray-500 flex justify-center items-center text-white text-xs">Me</div>`
                : `<div class="w-10 h-10 rounded-full bg-wave flex justify-center items-center text-white font-bold shadow-md text-xs border-2 border-white">AI</div>`;
            let bubbleColor = sender === 'Me' ? 'bg-orange-500 text-white rounded-tr-none' : 'bg-gray-700 text-white rounded-tl-none';

            div.innerHTML = `${avatar}<div class="${bubbleColor} p-3 rounded-2xl max-w-[80%] text-sm shadow-md">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = chatInput.value.trim();
            if (!msg) return;

            appendMessage('Me', msg);
            chatInput.value = '';
            
            const loadingId = "loading-" + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = "flex items-start gap-3";
            loadingDiv.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-wave flex justify-center items-center text-white font-bold shadow-md text-xs border-2 border-white">AI</div>
                <div class="bg-gray-700 text-gray-400 p-3 rounded-2xl rounded-tl-none text-sm shadow-md">กำลังพิมพ์... ✍️</div>
            `;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'chat', data: { message: msg } }) });
                const result = await response.json();
                document.getElementById(loadingId).remove(); 
                
                if (result.status === 'success') {
                    appendMessage('AI', result.message);
                } else { appendMessage('AI', '❌ ระบบขัดข้อง: ' + result.message); }
            } catch (error) { document.getElementById(loadingId).remove(); appendMessage('AI', '❌ เชื่อมต่อไม่สำเร็จ'); }
        });

        // 6. ระบบเปิด/ปิด และส่งข้อมูล Modal ของน้ำหนัก/ส่วนสูง
        function openModal() { document.getElementById('stats-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('stats-modal').classList.add('hidden'); }
        
        async function saveStats() {
            const h = document.getElementById('input-height').value;
            const w = document.getElementById('input-weight').value;
            
            if(!h || !w) { alert('กรุณากรอกข้อมูลให้ครบถ้วน'); return; }
            
            document.getElementById('btn-save-stats').innerText = 'กำลังบันทึก...';
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateBodyStats', data: { height: h, weight: w } })
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
                    closeModal();
                    document.getElementById('input-height').value = '';
                    document.getElementById('input-weight').value = '';
                }
            } catch (error) { alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล'); }
            finally { document.getElementById('btn-save-stats').innerText = 'บันทึก'; }
        }

        // ดึงข้อมูลตอนเปิดแอป
        window.onload = () => { loadDashboard(); loadQuests(); };
    </script>
</body>
</html>
